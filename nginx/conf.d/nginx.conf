upstream frontend {
    server hord_client:3000;
}

upstream backend {
    server hord_server:8000;
}

server {
    listen 80;
    listen [::]:80;

    server_name hord.food www.hord.food;

    server_tokens off;

    # Let's Encrypt HTTP-01 challenge, served from the volume shared
    # with the certbot service. Must stay reachable over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else moves to HTTPS. Note this whole file requires a
    # cert to already exist at /etc/letsencrypt/live/hord.food -- see
    # the SSL bootstrap steps in deployment_setup.md before deploying
    # this for the first time on a server without one.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 default_server ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name hord.food www.hord.food;

    server_tokens off;

    ssl_certificate /cert/live/hord.food/fullchain.pem;
    ssl_certificate_key /cert/live/hord.food/privkey.pem;

    location /api {
        add_header Cache-Control "public, max-age=10";
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location /admin {
        add_header Cache-Control "no-store, max-age=0";
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location /graphql {
        add_header Cache-Control "public, max-age=10";
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location /static {
        add_header Cache-Control "public, max-age=31536000";
        alias /staticfiles/;
        expires 30d;
    }

    location / {
        add_header Cache-Control "public, max-age=31536000";
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /inventory {
        add_header Cache-Control "private, no-store";
    }
}
