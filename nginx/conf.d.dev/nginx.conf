upstream frontend {
    server hord_client:3000;
}

upstream backend {
    server hord_server:8000;
}

# Plain-HTTP config for local dev: no TLS cert is available outside of
# the production server, so this skips the HTTPS redirect and cert
# loading in nginx/conf.d/nginx.conf and proxies straight over HTTP.
server {
    listen 80;
    listen [::]:80;

    server_tokens off;

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location /admin {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location /graphql {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    location /static {
        alias /staticfiles/;
    }

    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
